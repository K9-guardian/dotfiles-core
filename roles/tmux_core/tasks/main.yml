- name: Get tmux information
  include_tasks: "../../tasks/github_release_asset.yml"
  vars:
    github_repo: "tmux/tmux"

- name: Install tmux from tarball
  include_tasks: "../../tasks/install_tarball.yml"
  vars:
    tarball_app_name: tmux
    tarball_url: "{{ _gh_download_url }}"
    tarball_install_dir: "{{ tmux_install_dir }}"
    tarball_extra_opts:
      - "--strip-components=1"
    tarball_binary_subpath: "bin/tmux"
    tarball_symlink_name: "tmux"

- name: Copy tmux configuration
  ansible.posix.synchronize:
    src: "config/"
    dest: "~"
    times: false
    checksum: true
