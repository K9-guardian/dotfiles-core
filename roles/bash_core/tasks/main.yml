- name: Change login shell to /bin/bash
  ansible.builtin.command:
    cmd: "chsh -s {{ '/opt/homebrew/bin/bash' if ansible_facts.system == 'Darwin' else '/bin/bash' }} {{ ansible_facts.user_id }}"
  become: true
  changed_when: false

- name: Copy bash configuration
  ansible.posix.synchronize:
    src: "config/"
    dest: "~"
    times: false
    checksum: true
