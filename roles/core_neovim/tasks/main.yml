- name: Get neovim v0.10.4 information
  include_tasks: "../../tasks/github_release_asset.yml"
  vars:
    github_repo: "neovim/neovim"
    github_release_tag: "{{ neovim_release_tag }}"

- name: Install neovim v0.10.4 from tarball
  include_tasks: "../../tasks/install_tarball.yml"
  vars:
    tarball_app_name: neovim
    tarball_url: "{{ _gh_download_url }}"
    tarball_install_dir: "{{ neovim_install_dir }}"
    tarball_extra_opts:
      - "--strip-components=1"
    tarball_binary_subpath: "bin/nvim"
    tarball_symlink_name: "nvim"

- name: Copy neovim configuration
  ansible.posix.synchronize:
    src: "config/"
    dest: "~/.config/nvim"
    times: false
    checksum: true
